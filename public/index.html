<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>365 Techies AI OS</title>
  <meta name="description" content="A browser desktop with a built-in AI assistant, by 365 Techies — friendly IT support in Bournemouth & Dorset." />
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="os.css" />
</head>
<body>
  <!-- ============ LOGIN ============ -->
  <div id="login" class="login">
    <div class="login__card">
      <div class="login__brand"><span class="login__logo">365</span>techies <span class="login__os">AI&nbsp;OS</span></div>
      <p class="login__tag">Your own desktop, with a built-in AI assistant.</p>
      <form id="auth-form" class="login__form" autocomplete="on">
        <label class="field"><span>Email</span><input id="email" type="email" autocomplete="username" placeholder="you@example.com" required /></label>
        <label class="field"><span>Password</span><input id="password" type="password" autocomplete="current-password" placeholder="At least 6 characters" required /></label>
        <p id="auth-error" class="login__error" hidden></p>
        <button id="auth-submit" type="submit" class="btn btn--primary">Sign in</button>
      </form>
      <p class="login__switch">
        <span id="switch-text">New here?</span>
        <a href="#" id="switch-link">Create an account</a>
      </p>
      <p class="login__note">A 365 Techies prototype. Don't reuse a real password &mdash; this is a demo.</p>
    </div>
  </div>

  <!-- ============ DESKTOP ============ -->
  <div id="desktop" class="desktop" hidden>
    <div class="topbar">
      <div class="topbar__brand"><span class="topbar__logo">365</span>techies <span class="topbar__os">AI&nbsp;OS</span></div>
      <div class="topbar__user">
        <span id="hello"></span>
        <button id="logout" class="btn btn--ghost">Sign out</button>
      </div>
    </div>

    <div id="icons" class="icons"></div>
    <div id="windows" class="windows"></div>

    <div class="taskbar">
      <button id="start-btn" class="taskbar__start">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5.5 11 4v7H3zM13 3.7 21 2.5V11h-8zM3 13h8v7l-8-1.5zM13 13h8v8.5L13 20z" fill="currentColor" stroke="none"/></svg>
        Start
      </button>
      <div id="task-apps" class="taskbar__apps"></div>
      <div id="clock" class="taskbar__clock"></div>
    </div>

    <div id="start-menu" class="start-menu" hidden>
      <p class="start-menu__head">Apps</p>
      <div id="start-list" class="start-menu__list"></div>
    </div>
  </div>

  <!-- toast notifications -->
  <div id="toasts" aria-live="polite" aria-atomic="false"></div>

  <script src="os.js"></script>
</body>
</html>
